<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — DocIntel AI</title>
  <meta name="description" content="Sign in to your DocIntel AI account to access your document dashboard.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="css/main.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--navy-900);
    }

    /* ambient glow */
    body::before {
      content: "";
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(245,158,11,0.06) 0%, transparent 70%);
      top: -150px; left: -150px;
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: "";
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(99,102,241,0.04) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      pointer-events: none; z-index: 0;
    }

    .auth-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      position: relative;
      z-index: 1;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--navy-800);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 2.5rem 2.25rem;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 1.75rem;
      text-decoration: none;
    }
    .auth-logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--gold-500), #D97706);
      border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .auth-logo-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-100);
      letter-spacing: -0.3px;
    }

    .auth-heading {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-heading h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-100);
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }
    .auth-heading p {
      font-size: 13px;
      color: var(--text-400);
    }

    .form-group {
      margin-bottom: 1.1rem;
    }
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-400);
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      background: rgba(6,9,18,0.6);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 10px 14px;
      font-size: 14px;
      color: var(--text-100);
      font-family: var(--font);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-input::placeholder { color: var(--text-600); }
    .form-input:focus {
      border-color: var(--gold-500);
      box-shadow: 0 0 0 3px rgba(245,158,11,0.12);
    }

    .error-box {
      display: none;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--r-sm);
      padding: 10px 14px;
      font-size: 13px;
      color: #fca5a5;
      margin-bottom: 1.1rem;
      line-height: 1.5;
    }
    .error-box.show { display: block; }

    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--gold-500), #D97706);
      border: none;
      border-radius: var(--r-sm);
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      color: #000;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 0.5rem;
    }
    .submit-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(245,158,11,0.35);
    }
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .btn-spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 13px;
      color: var(--text-500);
    }
    .auth-footer a {
      color: var(--gold-500);
      text-decoration: none;
      font-weight: 500;
    }
    .auth-footer a:hover { text-decoration: underline; }

    .auth-back {
      text-align: center;
      margin-top: 1rem;
    }
    .auth-back a {
      font-size: 12px;
      color: var(--text-600);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: color 0.15s;
    }
    .auth-back a:hover { color: var(--text-400); }
  </style>
</head>
<body>

<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>if (typeof initNav === 'function') initNav();</script>

<div class="auth-wrapper">
  <div class="auth-card">

    <a href="/" class="auth-logo">
      <div class="auth-logo-icon">📄</div>
      <span class="auth-logo-name">DocIntel AI</span>
    </a>

    <div class="auth-heading">
      <h1>Welcome back</h1>
      <p>Sign in to access your document dashboard</p>
    </div>

    <div class="error-box" id="errorBox"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" name="email"
               required autocomplete="email" placeholder="you@company.com">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password"
               required autocomplete="current-password" placeholder="••••••••">
      </div>

      <button class="submit-btn" type="submit" id="submitBtn">
        <span id="btnText">Sign In</span>
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/signup">Sign up</a>
    </div>

    <div class="auth-back">
      <a href="/">← Back to Homepage</a>
    </div>

  </div>
</div>

<script>
  const loginForm  = document.getElementById('loginForm');
  const submitBtn  = document.getElementById('submitBtn');
  const btnText    = document.getElementById('btnText');
  const errorBox   = document.getElementById('errorBox');

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.classList.add('show');
  }
  function clearError() {
    errorBox.classList.remove('show');
    errorBox.textContent = '';
  }
  function setLoading(on) {
    submitBtn.disabled = on;
    btnText.innerHTML = on
      ? '<div class="btn-spinner"></div><span>Signing in…</span>'
      : 'Sign In';
  }

  // If already logged in, go straight to dashboard
  (function () {
    const t = localStorage.getItem('token');
    if (t && t !== 'null' && t !== 'undefined' && t.trim() !== '') {
      window.location.href = '/dashboard';
    }
  })();

  loginForm.addEventListener('submit', async function (e) {
    e.preventDefault();
    clearError();

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      showError('Please enter your email and password.');
      return;
    }

    setLoading(true);
    try {
      await DocAPI.login(email, password);
      window.location.href = '/dashboard';
    } catch (err) {
      showError(err.message || 'Sign in failed. Please check your credentials.');
      setLoading(false);
    }
  });
</script>

</body>
</html>
