<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — DocIntel AI</title>
  <meta name="description" content="Create your free DocIntel AI account and start extracting data from invoices instantly.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/main.css">
  <script src="https://accounts.google.com/gsi/client" async></script>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--navy-800);
      font-family: 'Inter', sans-serif;
      margin: 0;
    }

    .auth-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--navy-700);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2.5rem 2.25rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      box-sizing: border-box;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 1.5rem;
      text-decoration: none;
      font-size: 20px;
      font-weight: 700;
      color: var(--text-100);
    }
    .auth-logo-dot {
      width: 8px;
      height: 8px;
      background: var(--gold-500);
      border-radius: 50%;
    }

    .auth-heading {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-heading h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-100);
      margin: 0 0 6px 0;
    }
    .auth-heading p {
      font-size: 14px;
      color: var(--text-400);
      margin: 0;
    }

    /* Google button centering */
    .g-btn-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
      width: 100%;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: var(--text-500);
      font-size: 12px;
      margin: 1.5rem 0;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }
    .auth-divider:not(:empty)::before {
      margin-right: .5em;
    }
    .auth-divider:not(:empty)::after {
      margin-left: .5em;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-400);
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      background: var(--navy-600);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      color: var(--text-200);
      box-sizing: border-box;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .form-input:focus {
      border-color: var(--gold-500);
    }
    .form-hint {
      font-size: 11px;
      color: var(--text-500);
      margin-top: 6px;
    }

    .error-box {
      display: none;
      color: #ef4444;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 1.25rem;
      line-height: 1.5;
    }
    .error-box.show {
      display: block;
    }
    .error-box.info {
      color: var(--gold-500);
      background: rgba(245,158,11,0.1);
      border-color: rgba(245,158,11,0.3);
    }

    .submit-btn {
      width: 100%;
      background: var(--gold-500);
      color: #000;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .submit-btn:hover {
      opacity: 0.9;
    }
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 13px;
      color: var(--text-400);
    }
    .auth-footer a {
      color: var(--gold-500);
      text-decoration: none;
    }
    .auth-footer a:hover {
      text-decoration: underline;
    }

    .auth-back {
      text-align: center;
      margin-top: 1rem;
    }
    .auth-back a {
      font-size: 12px;
      color: var(--text-500);
      text-decoration: none;
    }
    .auth-back a:hover {
      color: var(--text-300);
    }
  </style>
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <a href="/" class="auth-logo">
      DocIntel AI <span class="auth-logo-dot"></span>
    </a>

    <div class="auth-heading">
      <h1>Create your free account</h1>
      <p>20 extractions per day. No credit card.</p>
    </div>

    <div class="error-box" id="errorBox"></div>

    <!-- OPTION 1 — Google Sign In -->
    <div class="g-btn-wrapper">
      <div id="g_id_onload"
           data-client_id="489890481512-jf8j5mkh5hnme5t8jl4ddvl9jupv9qql.apps.googleusercontent.com"
           data-callback="handleGoogleLogin"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
           data-type="standard"
           data-size="large"
           data-theme="filled_black"
           data-text="signup_with"
           data-shape="rectangular"
           data-logo_alignment="left"
           data-width="372">
      </div>
    </div>

    <div class="auth-divider">or sign up with email</div>

    <!-- OPTION 2 — Email/Password Registration Form -->
    <form id="signupForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="fullName">Full Name</label>
        <input class="form-input" type="text" id="fullName" placeholder="Your full name" required autocomplete="name">
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" placeholder="you@company.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="Min. 8 characters" required autocomplete="new-password">
        <div class="form-hint">At least 8 characters</div>
      </div>

      <button class="submit-btn" type="submit" id="submitBtn">Create Account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login">Sign in →</a>
    </div>

    <div class="auth-back">
      <a href="/">← Back to Homepage</a>
    </div>

  </div>
</div>

<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
  if (typeof initNav === 'function') initNav();

  const signupForm = document.getElementById('signupForm');
  const submitBtn = document.getElementById('submitBtn');
  const errorBox  = document.getElementById('errorBox');

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.className = 'error-box show';
  }

  function showLoading(msg) {
    errorBox.textContent = msg;
    errorBox.className = 'error-box show info';
  }

  function clearError() {
    errorBox.className = 'error-box';
    errorBox.textContent = '';
  }

  // Google Signup Callback Handler (same endpoint/handler as login)
  async function handleGoogleLogin(googleResponse) {
    clearError();
    showLoading('Creating account with Google...');
    try {
      const res = await fetch('https://doc-intelligence-api-tubh.onrender.com/auth/google', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ credential: googleResponse.credential })
      });
      if (res.ok) {
        window.location.href = '/dashboard';
      } else {
        const err = await res.json().catch(() => ({}));
        showError(err.detail || 'Google signup failed');
      }
    } catch (err) {
      showError('Network error during Google sign-up. Please try again.');
    }
  }

  // Email/Password Submit Handler
  signupForm.addEventListener('submit', async function (e) {
    e.preventDefault();
    clearError();

    const fullName = document.getElementById('fullName').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password || !fullName) {
      showError('Please fill in all fields.');
      return;
    }

    if (password.length < 8) {
      showError('Password must be at least 8 characters.');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating account...';

    try {
      const res = await fetch('https://doc-intelligence-api-tubh.onrender.com/auth/register', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, full_name: fullName })
      });

      if (res.ok) {
        window.location.href = '/dashboard';
      } else {
        const data = await res.json().catch(() => ({}));
        if (res.status === 409) {
          showError('Account already exists. Please sign in.');
        } else if (res.status === 422) {
          showError('Password must be at least 8 characters.');
        } else {
          showError(data.detail || 'Signup failed. Please try again.');
        }
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    } catch (err) {
      showError('Network error. Please try again.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Create Account';
    }
  });
</script>

</body>
</html>
