<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — DocIntel AI</title>
  <meta name="description" content="View and manage your extracted invoice documents, usage quota, and AI confidence scores.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="css/main.css">
  <style>
    :root {
      --sidebar-w: 260px;
    }

    body {
      background: var(--navy-900);
      color: var(--text-100);
      font-family: var(--font, 'Inter', sans-serif);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top Nav ───────────────────────────────────────────────── */
    .topnav {
      height: 60px;
      background: rgba(15,23,42,0.9);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0; z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none;
      font-size: 16px; font-weight: 700;
      color: var(--text-100); letter-spacing: -0.3px;
    }
    .logo-dot {
      width: 8px; height: 8px;
      background: var(--gold-500);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--gold-500);
    }
    .nav-right {
      display: flex; align-items: center; gap: 1rem;
    }
    .nav-user-email {
      font-size: 12px; color: var(--text-500);
    }
    .plan-badge {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
      padding: 2px 8px; border-radius: 20px;
    }
    .plan-badge.free    { background: rgba(255,255,255,0.07); color: var(--text-400); }
    .plan-badge.starter { background: rgba(245,158,11,0.15); color: var(--gold-500); }
    .plan-badge.business { background: rgba(139,92,246,0.15); color: #a78bfa; }
    .plan-badge.enterprise { background: rgba(16,185,129,0.15); color: var(--green-500); }
    .signout-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px; font-weight: 500;
      color: var(--text-400);
      cursor: pointer; font-family: var(--font);
      transition: all 0.15s;
    }
    .signout-btn:hover { border-color: var(--text-500); color: var(--text-200); }

    /* ── Page layout ──────────────────────────────────────────── */
    .page-wrap {
      flex: 1;
      max-width: 1180px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* ── Stats row ────────────────────────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }
    .stat-card {
      background: var(--navy-800);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 1.25rem 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold-500), transparent);
    }
    .stat-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.7px; color: var(--text-500); margin-bottom: 8px;
    }
    .stat-value {
      font-size: 1.75rem; font-weight: 700; color: var(--text-100);
      letter-spacing: -0.03em; font-family: 'JetBrains Mono', monospace;
    }
    .stat-sub {
      font-size: 11px; color: var(--text-600); margin-top: 4px;
    }

    /* Usage meter */
    .meter-wrap { margin-top: 10px; }
    .meter-bar {
      height: 4px; background: rgba(255,255,255,0.06);
      border-radius: 2px; overflow: hidden; margin-bottom: 5px;
    }
    .meter-fill {
      height: 100%; border-radius: 2px;
      background: var(--green-500);
      transition: width 0.5s ease, background 0.5s;
    }
    .meter-labels {
      display: flex; justify-content: space-between;
      font-size: 10px; color: var(--text-600);
    }

    /* ── Section header ───────────────────────────────────────── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
    }
    .section-title {
      font-size: 15px; font-weight: 600; color: var(--text-200);
      display: flex; align-items: center; gap: 8px;
    }
    .section-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold-500); box-shadow: 0 0 6px var(--gold-500);
    }
    .refresh-btn {
      background: transparent; border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 10px;
      font-size: 11px; color: var(--text-500);
      cursor: pointer; font-family: var(--font); transition: all 0.15s;
    }
    .refresh-btn:hover { color: var(--text-200); border-color: var(--text-500); }

    /* ── Documents panel ──────────────────────────────────────── */
    .panel {
      background: var(--navy-800);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      overflow: hidden;
    }
    .panel-head {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left; padding: 0.65rem 1rem;
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.7px;
      color: var(--text-500);
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 0.8rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--text-300);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.015); }

    .doc-name {
      color: var(--text-200); font-weight: 500;
      max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* Status chips */
    .chip {
      display: inline-block;
      font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .chip.completed  { background: rgba(16,185,129,0.12); color: var(--green-500); }
    .chip.processing { background: rgba(245,158,11,0.12); color: var(--gold-500); animation: pulse 1.5s ease-in-out infinite; }
    .chip.queued     { background: rgba(255,255,255,0.06); color: var(--text-500); }
    .chip.failed     { background: rgba(239,68,68,0.10); color: #fca5a5; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* Action buttons in table */
    .action-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .act-btn {
      display: inline-flex; align-items: center; gap: 4px;
      background: transparent; border: 1px solid var(--border);
      border-radius: 5px; padding: 4px 10px;
      font-size: 11px; font-weight: 500; color: var(--text-400);
      cursor: pointer; font-family: var(--font); transition: all 0.15s;
      white-space: nowrap;
    }
    .act-btn:hover { color: var(--text-100); border-color: var(--text-500); }
    .act-btn.gold { color: var(--gold-500); border-color: rgba(245,158,11,0.3); }
    .act-btn.gold:hover { background: rgba(245,158,11,0.08); }
    .act-btn.green { color: var(--green-500); border-color: rgba(16,185,129,0.3); }
    .act-btn.green:hover { background: rgba(16,185,129,0.06); }
    .act-btn.danger { color: #fca5a5; border-color: rgba(239,68,68,0.25); }
    .act-btn.danger:hover { background: rgba(239,68,68,0.06); }

    /* Feedback thumbs */
    .fb-row { display: flex; align-items: center; gap: 4px; }
    .fb-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 4px; padding: 3px 7px; font-size: 12px;
      cursor: pointer; transition: all 0.15s; font-family: var(--font);
      color: var(--text-500);
    }
    .fb-btn:hover:not(:disabled) { background: rgba(255,255,255,0.05); color: var(--text-200); }
    .fb-btn:disabled { opacity: 0.4; cursor: default; }
    .fb-done { font-size: 11px; color: var(--text-500); font-style: italic; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3.5rem 1rem;
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .empty-state h3 { font-size: 15px; color: var(--text-300); margin-bottom: 0.4rem; }
    .empty-state p  { font-size: 13px; color: var(--text-500); }
    .empty-state a  { color: var(--gold-500); text-decoration: none; font-weight: 500; }

    /* Loading row */
    .loading-row { text-align: center; padding: 2.5rem; color: var(--text-500); font-size: 13px; }
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: var(--gold-500);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast-container {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      z-index: 9999; display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      padding: 10px 16px; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      animation: toastIn 0.2s ease;
    }
    .toast.success { background: #064e3b; color: #6ee7b7; border: 1px solid #065f46; }
    .toast.error   { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
    @keyframes toastIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    /* Confidence badge */
    .conf-high { color: var(--green-500); font-weight: 600; }
    .conf-mid  { color: var(--gold-500); font-weight: 600; }
    .conf-low  { color: #fca5a5; font-weight: 600; }
  </style>
</head>
<body>

<!-- Session guard: redirect immediately if no valid token -->
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>

<div class="toast-container" id="toastContainer"></div>

<!-- ── Top nav ──────────────────────────────────────────────────── -->
<nav class="topnav">
  <a class="nav-logo" href="/">DocIntel AI <span class="logo-dot"></span></a>
  <div class="nav-right">
    <span class="nav-user-email" id="navEmail">Loading…</span>
    <span class="plan-badge free" id="navPlan">Free</span>
    <button class="signout-btn" onclick="signOut()">Sign Out</button>
  </div>
</nav>

<!-- ── Page ─────────────────────────────────────────────────────── -->
<div class="page-wrap">

  <!-- Stats -->
  <div class="stats-row">

    <div class="stat-card">
      <div class="stat-title">Total Documents</div>
      <div class="stat-value" id="statTotal">—</div>
      <div class="stat-sub">All time</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">Usage Quota</div>
      <div class="stat-value" id="statUsage">—</div>
      <div class="meter-wrap">
        <div class="meter-bar">
          <div class="meter-fill" id="meterFill" style="width:0%"></div>
        </div>
        <div class="meter-labels">
          <span id="meterWindow">Resets Daily</span>
          <span id="meterPct">0%</span>
        </div>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-title">Avg. AI Confidence</div>
      <div class="stat-value" id="statConf">—</div>
      <div class="stat-sub">Across completed docs</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">Upload More</div>
      <div style="margin-top:0.5rem;">
        <a href="/demo" style="
          display:inline-flex; align-items:center; gap:6px;
          background:linear-gradient(135deg,var(--gold-500),#D97706);
          color:#000; font-weight:600; font-size:13px;
          padding:8px 16px; border-radius:6px; text-decoration:none;
          transition:opacity 0.15s;
        ">📄 Upload Invoice</a>
      </div>
      <div class="stat-sub" style="margin-top:8px;">PDF, JPG, PNG accepted</div>
    </div>

  </div>

  <!-- Documents list -->
  <div class="section-header">
    <div class="section-title">
      <div class="section-dot"></div> My Documents
    </div>
    <button class="refresh-btn" onclick="loadDashboard()">⟳ Refresh</button>
  </div>

  <div class="panel">
    <div class="table-wrap">
      <table id="docsTable">
        <thead>
          <tr>
            <th>File Name</th>
            <th>Date</th>
            <th>Status</th>
            <th>Confidence</th>
            <th>Invoice #</th>
            <th>Total</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="docsTbody">
          <tr>
            <td colspan="7">
              <div class="loading-row">
                <span class="spinner"></span> Loading your documents…
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div><!-- /page-wrap -->

<script>
  /* ────────────────────────────────────────────────────────────── */
  /*  Helpers                                                        */
  /* ────────────────────────────────────────────────────────────── */
  function toast(msg, type = 'success') {
    const c = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }

  function signOut() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/';
  }

  function confClass(val) {
    if (!val) return '';
    const pct = Math.round(val * 100);
    if (pct >= 85) return 'conf-high';
    if (pct >= 65) return 'conf-mid';
    return 'conf-low';
  }
  function confText(val) {
    return val ? Math.round(val * 100) + '%' : '—';
  }
  function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  }
  function fmtMoney(v, currency) {
    if (!v) return '—';
    return (currency === 'USD' ? '$' : '₹') + Number(v).toLocaleString('en-IN');
  }

  /* ────────────────────────────────────────────────────────────── */
  /*  Load profile + docs + stats                                   */
  /* ────────────────────────────────────────────────────────────── */
  async function loadDashboard() {
    try {
      const [profile, docs] = await Promise.all([
        DocAPI.getProfile(),
        DocAPI.listDocuments(),
      ]);
      renderProfile(profile);
      renderStats(profile, docs);
      renderDocs(docs);
    } catch (err) {
      toast('Failed to load dashboard: ' + (err.message || err), 'error');
    }

    // Also load aggregate stats for total doc count
    try {
      const s = await DocAPI.getStats();
      if (s && s.total_documents != null) {
        document.getElementById('statTotal').textContent = s.total_documents;
      }
    } catch (_) { /* non-critical */ }
  }

  function renderProfile(p) {
    document.getElementById('navEmail').textContent  = p.email || '—';
    const badge = document.getElementById('navPlan');
    badge.textContent  = (p.plan || 'free').charAt(0).toUpperCase() + (p.plan || 'free').slice(1);
    badge.className    = 'plan-badge ' + (p.plan || 'free');

    // Usage meter
    const plan    = p.plan || 'free';
    const isFree  = plan === 'free';
    const used    = isFree ? (p.files_used_today || 0) : (p.files_used_month || 0);
    const limits  = { free: 5, starter: 100, business: 500, enterprise: Infinity };
    const limit   = limits[plan] ?? 5;
    const pct     = isFinite(limit) ? Math.min(100, Math.round((used / limit) * 100)) : 0;

    document.getElementById('statUsage').textContent    = `${used} / ${isFinite(limit) ? limit : '∞'}`;
    document.getElementById('meterWindow').textContent  = isFree ? 'Resets Daily' : 'Resets Monthly';
    document.getElementById('meterPct').textContent     = pct + '%';

    const fill = document.getElementById('meterFill');
    fill.style.width      = pct + '%';
    fill.style.background = pct > 90 ? 'var(--red-500, #ef4444)'
                          : pct > 70 ? 'var(--gold-500)'
                          : 'var(--green-500)';
  }

  function renderStats(profile, docs) {
    // Total from list (fallback until /stats responds)
    document.getElementById('statTotal').textContent = docs.length;

    // Avg confidence
    const done = docs.filter(d => d.status === 'completed' && d.ai_confidence != null);
    if (done.length > 0) {
      const avg = Math.round(done.reduce((a, d) => a + d.ai_confidence, 0) / done.length * 100);
      document.getElementById('statConf').textContent = avg + '%';
    } else {
      document.getElementById('statConf').textContent = '—';
    }
  }

  /* ────────────────────────────────────────────────────────────── */
  /*  Docs table                                                     */
  /* ────────────────────────────────────────────────────────────── */
  function renderDocs(docs) {
    const tbody = document.getElementById('docsTbody');
    if (!docs || docs.length === 0) {
      tbody.innerHTML = `
        <tr><td colspan="7">
          <div class="empty-state">
            <div class="empty-icon">📂</div>
            <h3>No documents yet</h3>
            <p>Upload your first invoice to get started. <a href="/demo">Upload now →</a></p>
          </div>
        </td></tr>`;
      return;
    }

    tbody.innerHTML = docs.map(d => buildRow(d)).join('');
  }

  function buildRow(d) {
    const statusChip = `<span class="chip ${d.status}">${d.status}</span>`;
    const conf = d.status === 'completed'
      ? `<span class="${confClass(d.ai_confidence)}">${confText(d.ai_confidence)}</span>`
      : '<span style="color:var(--text-600)">—</span>';
    const invNum = d.invoice_number || '<span style="color:var(--text-600)">—</span>';
    const total  = fmtMoney(d.total_amount, d.currency);

    // Actions
    let actions = '';
    if (d.status === 'completed') {
      const id = d.id;
      actions = `
        <div class="action-row">
          <button class="act-btn gold" onclick="dlExport(${id},'csv')">⬇ CSV</button>
          <button class="act-btn gold" onclick="dlExport(${id},'excel')">⬇ Excel</button>
          <div class="fb-row" id="fb-${id}">
            <button class="fb-btn" title="Accurate" onclick="sendFeedback(${id}, 1, this)">👍</button>
            <button class="fb-btn" title="Inaccurate" onclick="sendFeedback(${id}, -1, this)">👎</button>
          </div>
          <button class="act-btn danger" onclick="delDoc(${id})">🗑</button>
        </div>`;
    } else if (d.status === 'failed') {
      actions = `
        <div class="action-row">
          <button class="act-btn" onclick="reprocess(${d.id})">↻ Retry</button>
          <button class="act-btn danger" onclick="delDoc(${d.id})">🗑</button>
        </div>`;
    } else {
      actions = `<span style="font-size:11px;color:var(--text-600);">Processing…</span>`;
    }

    return `
      <tr>
        <td><div class="doc-name" title="${d.file_name || ''}">${d.file_name || 'Untitled'}</div></td>
        <td>${fmtDate(d.created_at)}</td>
        <td>${statusChip}</td>
        <td>${conf}</td>
        <td>${invNum}</td>
        <td>${total}</td>
        <td>${actions}</td>
      </tr>`;
  }

  /* ────────────────────────────────────────────────────────────── */
  /*  Actions                                                        */
  /* ────────────────────────────────────────────────────────────── */
  async function dlExport(id, fmt) {
    try {
      toast(`Preparing ${fmt.toUpperCase()} download…`);
      await DocAPI.downloadExport(id, fmt);
    } catch (err) {
      toast('Export failed: ' + err.message, 'error');
    }
  }

  async function sendFeedback(id, rating, btn) {
    const row = document.getElementById('fb-' + id);
    if (!row) return;
    row.querySelectorAll('.fb-btn').forEach(b => b.disabled = true);
    try {
      await DocAPI.submitFeedback(id, rating);
      row.innerHTML = `<span class="fb-done">${rating === 1 ? '👍 Thanks!' : '👎 Noted'}</span>`;
    } catch (err) {
      row.querySelectorAll('.fb-btn').forEach(b => b.disabled = false);
      toast('Could not save feedback.', 'error');
    }
  }

  async function delDoc(id) {
    if (!confirm('Delete this document? This cannot be undone.')) return;
    try {
      await DocAPI.deleteDocument(id);
      toast('Document deleted.');
      loadDashboard();
    } catch (err) {
      toast('Delete failed: ' + err.message, 'error');
    }
  }

  async function reprocess(id) {
    try {
      await DocAPI.reprocessDocument(id);
      toast('Reprocessing started. Refresh in a moment.');
      setTimeout(loadDashboard, 3000);
    } catch (err) {
      toast('Reprocess failed: ' + err.message, 'error');
    }
  }

  /* ────────────────────────────────────────────────────────────── */
  /*  Boot                                                           */
  /* ────────────────────────────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', function () {
    // Double-check token (auth.js already guards, but belt-and-suspenders)
    const token = localStorage.getItem('token');
    const invalid = !token || token === 'null' || token === 'undefined' || token.trim() === '';
    if (invalid) { window.location.href = '/signup'; return; }

    loadDashboard();
  });
</script>

</body>
</html>
